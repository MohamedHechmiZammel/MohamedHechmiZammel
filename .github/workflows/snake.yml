name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: MohamedHechmiZammel
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: git config user.name 'github-actions[bot]' && git config user.email 'github-actions[bot]@users.noreply.github.com'
      - run: |
          git checkout --orphan output 2>/dev/null || git checkout output
          git rm -rf . --ignore-unmatch
          cp dist/github-snake.svg .
          cp dist/github-snake-dark.svg .
          git add github-snake.svg github-snake-dark.svg
          git commit -m "update snake" --allow-empty
          git push origin output --force
