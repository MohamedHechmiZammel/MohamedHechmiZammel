name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: MohamedHechmiZammel
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake to output branch
        run: |
          sudo cp dist/github-snake.svg /tmp/github-snake.svg
          sudo cp dist/github-snake-dark.svg /tmp/github-snake-dark.svg
          sudo chmod 644 /tmp/github-snake.svg /tmp/github-snake-dark.svg

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/MohamedHechmiZammel/MohamedHechmiZammel.git"
          git checkout --orphan output
          git rm -rf . --ignore-unmatch

          cp /tmp/github-snake.svg ./github-snake.svg
          cp /tmp/github-snake-dark.svg ./github-snake-dark.svg
          git add github-snake.svg github-snake-dark.svg
          git commit -m "update snake"
          git push --force origin output
